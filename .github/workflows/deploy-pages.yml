name: Deploy Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "package-lock.json"
  workflow_dispatch:

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build landing
        run: npm run build -w @pooshit/web
        env:
          VITE_API_URL: https://api.pooshit.dev
          VITE_GITHUB_URL: https://github.com/rafaelcg/pooshit

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/web/dist --project-name=pooshit
